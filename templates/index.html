<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kifaru Real Estate</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-kifaru { background-color: #10B981; }
        .text-kifaru { color: #10B981; }
    </style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="font-black text-2xl tracking-tighter uppercase">Kifaru <span class="text-kifaru">Estate</span></a>
            <button onclick="toggleCart()" class="bg-slate-900 text-white px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
                Inquiries (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <header class="py-20 bg-slate-900 text-center text-white">
        <h1 class="text-5xl font-black mb-4">Find Your Space.</h1>
        <p class="text-slate-400">Verified properties in Dar es Salaam.</p>
    </header>

    <section class="container mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for p in properties %}
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                <div class="h-64 overflow-hidden relative">
                    <img src="{{ p.image_url }}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute top-4 left-4 bg-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">{{ p.status }}</div>
                </div>
                <div class="p-8">
                    <h3 class="font-bold text-xl mb-2">{{ p.title }}</h3>
                    <p class="text-slate-400 text-sm mb-4">📍 {{ p.location }}</p>
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-kifaru font-black text-xl">{{ "{:,.0f}".format(p.price) }} TZS</span>
                        {% if p.available_plots %}<span class="text-[10px] bg-emerald-50 text-kifaru px-2 py-1 rounded-md font-bold">PLOTS: {{ p.available_plots }}</span>{% endif %}
                    </div>
                    <button onclick="addToCart('{{ p.title }}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-kifaru transition">Quick Inquire</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-[100] transform translate-x-full transition-transform p-8">
        <h2 class="font-black text-xl mb-8">MY INQUIRY</h2>
        <div id="cart-items" class="space-y-4 mb-8"></div>
        <form action="/send_inquiry" method="POST" class="space-y-4">
            <input type="hidden" name="cart_data" id="cart_data">
            <input type="text" name="name" placeholder="Your Name" required class="w-full p-3 bg-slate-100 rounded-lg outline-none text-sm">
            <input type="text" name="phone" placeholder="Phone (e.g. 07...)" required class="w-full p-3 bg-slate-100 rounded-lg outline-none text-sm">
            <button class="w-full bg-kifaru text-white py-4 rounded-xl font-bold uppercase text-[10px]">Send to Agent</button>
            <button type="button" onclick="toggleCart()" class="w-full text-slate-400 text-[10px] font-bold uppercase">Close</button>
        </form>
    </div>

    <script>
        let cart = [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function addToCart(t) { if(!cart.includes(t)) { cart.push(t); updateUI(); toggleCart(); } }
        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart_data').value = cart.join(', ');
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div class="p-3 bg-slate-50 rounded-lg text-xs font-bold">${i}</div>`).join('');
        }
    </script>
</body>
</html>
